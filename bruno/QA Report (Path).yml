info:
  name: QA Report (Path)
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:3000/qa
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "input_date": "2026-04-15",
        "noTagline": false,
        "pdf_path": "/path/to-your/file.pdf"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
